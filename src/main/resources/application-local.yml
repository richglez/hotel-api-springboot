jwt:
  secret: tu-clave-secreta-muy-larga-minimo-32-caracteres
  expiration: 86400000

spring:
  datasource:
    username: postgres
    password: postgrespassword

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true       # Habilita el botón "Try it out"
    operations-sorter: method      # Ordena endpoints por método HTTP
    tags-sorter: alpha             # Ordena los tags alfabéticamente
    display-request-duration: true # Muestra el tiempo de respuesta
  packages-to-scan: com.richglez.hotel  # Escanea solo ese paquete