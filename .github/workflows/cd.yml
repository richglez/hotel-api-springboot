name: CD Pipeline # workflow name

permissions: # VM can read only repo.
  contents: read # read only VM workflow don't need to write anything or touch other resources in the repo.

# Control what happens when multiple executions of workflow are triggered at the same time in the same branch or environment.
concurrency:
  group: cd-${{ github.ref }} # ID to group runs based in branch or tag Its primary purpose is to ensure that only one workflow is running at a time for that particular group.
  cancel-in-progress: false   # Queues the new commit; ideal for CD because it ensures complete and clean deployments.


# Runs after "CI Pipeline" (ci.yml) finishes on main
# the name below must match ci.yml's "name:" exactly, or this won't trigger
on:   # This event happens when:
  workflow_run:   # Listen for finishing other workflow
    workflows: ["CI Pipeline"]  # wait for ci workflow
    types: [completed]  # when is completed
    branches: [main]

jobs:
  verify-deploy: # job ID (used to reference this job)
    name: Verify Railway deployment # job name shown in GitHub UI
    runs-on: ubuntu-latest          # fresh Ubuntu VM for every run
    timeout-minutes: 10             # tiempo de salida si algo fue mal -> evitar consumir minutos

    # ci.yml .conclusion -> success | failure | cancelled
    if: github.event.workflow_run.conclusion == 'success' # skip if CI failed
    # this never happen if 'failure' or 'cancelled' -> SKIPPED
    steps:
      - name: Wait for Railway's initial build   # step name
        run: sleep 60 # Action in VM terminal: this command freezes ⏸️ the workflow process  during 60s before go to the next step -> give Railway time to copy/build/install + deploy before checking

      # Next We checked if Railway had finished its part of correct deployment.
      - name: Check backend health    # step name
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "${{ vars.BACKEND_HEALTH_URL }}" > /dev/null; then
              echo "Backend OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Backend did not respond in time after deploy"
          exit 1
          # 10 max attempts($i -> attempt 1,2...)
          # exit 0 -> finish script & SUCCESS status.

      - name: Check frontend health   # step name
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "${{ vars.FRONTEND_URL }}" > /dev/null; then
              echo "Frontend OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Frontend did not respond in time after deploy"
          exit 1
          

# Railway builds and deploys automatically.
# So the job of CD is to confirm that what Railway deployed is actually alive.