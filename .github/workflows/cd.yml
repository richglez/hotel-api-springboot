name: CD Pipeline # workflow name

permissions: # VM can read only repo
  contents: read # read only VM workflow don't need to write anything or touch other resources in the repo.

# Control what happens when multiple executions of workflow are triggered at the same time in the same branch or environment.
concurrency:
  group: cd-${{ github.ref }} # This creates a single "group" to control the flow.
  cancel-in-progress: false   # if there's a workflow in progress, wait for it to finish before starting a new one -> CI -> CD

# Runs after "CI Pipeline" (ci.yml) finishes on main
# the name below must match ci.yml's "name:" exactly, or this won't trigger
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  verify-deploy:
    name: Verify Railway deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: github.event.workflow_run.conclusion == 'success' # skip if CI failed

    steps:
      - name: Wait for Railway's initial build
        run: sleep 60 # give Railway time to build + deploy before checking

      - name: Check backend health
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "${{ vars.BACKEND_HEALTH_URL }}" > /dev/null; then
              echo "Backend OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Backend did not respond in time after deploy"
          exit 1

      - name: Check frontend health
        run: |
          for i in $(seq 1 10); do
            if curl -fsS "${{ vars.FRONTEND_URL }}" > /dev/null; then
              echo "Frontend OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::error::Frontend did not respond in time after deploy"
          exit 1
          

# Railway builds and deploys automatically.
# So the job of CD is to confirm that what Railway deployed is actually alive.