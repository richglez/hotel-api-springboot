name: CI Pipeline

on:
  push:
    branches: [ main ]    # en cada push hacia main:

jobs: # ejecuta es job
  build: # nombre del job
    runs-on: ubuntu-latest

    steps:
      - name: "Display message"
        run: echo "Hello World!"

      - name: "Mostrando variables por defecto"
        run: |
          echo "Event: ${{ toJSON(github.event) }}"
