name: CI Pipeline # Workflow name shown in GitHub Actions tab

# Triggers: when does this workflow run?
on:
  push:
    branches: [ main ]          # runs on every push to main
  pull_request:
    branches: [ main ]          # runs when a PR targets main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend tests (Spring Boot)
  # ─────────────────────────────────────────
  backend-ci:                   # job ID (used to reference this job)
    name: Backend — Build & Test # job name shown in GitHub UI
    runs-on: ubuntu-latest       # fresh Ubuntu VM for every run

    # Spin up a real PostgreSQL container alongside the job
    # (the VM has no database by default — we need to create one)
    services:   # container
      postgres:                  # service name (used as hostname inside the VM)
        image: postgres:16       # same version as docker-compose.yml
        env:                     # temp database credentials (only for testing)
          POSTGRES_DB: hotel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432            # expose postgres port to the VM

        # check if postgres is ready (yes/no)
        # ask every 10s
        # if no response in 5s → failed attempt
        # if fails 5 times in a row → something is wrong
        # steps won't run until postgres is healthy
        options: >-
          --health-cmd pg_isready   
          --health-interval 10s     
          --health-timeout 5s       
          --health-retries 5                        

    steps:
      - name: Checkout code
        uses: actions/checkout@v6   # clones the repo into the VM (VM starts empty)

      - name: Setup Java 21
        uses: actions/setup-java@v5 # installs Java on the VM
        with:                       # parameters passed to the action above
          java-version: '21'        # must match the project's Java version
          distribution: 'temurin'   # OpenJDK distribution, most used in industry
          cache: 'maven'            # caches ~/.m2 dependencies between runs ⚡

      - name: Give execute permission to mvnw
        run: chmod +x ./mvnw        # Linux requires explicit execute permission (+x)
        # without this → Permission denied error

      - name: Run tests
        run: ./mvnw verify          # compile → test → verify (all in one command)
        env:                        # inject env variables into the VM for Spring Boot
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/hotel_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ${{ secrets.JWT_SECRET }} # pulled from GitHub Secrets (never hardcoded)

  # ─────────────────────────────────────────
  # JOB 2: Frontend build (React/Vite + TypeScript)
  # ─────────────────────────────────────────
  frontend-ci:                  # job ID
    name: Frontend — Build      # job name shown in GitHub UI
    runs-on: ubuntu-latest      # fresh Ubuntu VM

    defaults:
      run:
        working-directory: ./frontend # all steps in this job run from /frontend
        # avoids writing "cd frontend &&" on every step

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # clones the repo into the VM (VM starts empty)

      - name: Install pnpm
        uses: pnpm/action-setup@v6    # install pnpm
        with:   # parameters for action
          version: 11   # local version

      - name: Setup Node.js
        uses: actions/setup-node@v6   # Installs Node.js on the VM
        with:
          node-version: '22'    # LTS version, most stable
          cache: 'pnpm'          # cache node_modules between runs ⚡
          cache-dependency-path: frontend/pnpm-lock.yaml   # where to find lock file

